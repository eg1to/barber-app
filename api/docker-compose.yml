services:
  db:
    image: postgres:15
    
    container_name: barber_db_container
    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: barberapp_db
      
    ports:
      - "5432:5432"
      
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: